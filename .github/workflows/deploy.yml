name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BASE_PATH: /kafe-pro
      DEV_URL: http://localhost:8080
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build static site
        run: |
          npm run dev &
          DEV_PID=$!

          for i in $(seq 1 30); do
            if curl -sL ${DEV_URL}/en 2>/dev/null | grep -q '<!DOCTYPE'; then
              echo "Dev server ready"; break
            fi
            sleep 1
          done

          mkdir -p _site/src/assets/logos _site/src/assets/unveiled

          # 1) Download CSS from dev server
          # Vite dev server wraps CSS in a JS module — extract the raw CSS string
          curl -sL ${DEV_URL}/src/styles.css -o /tmp/app_raw.js
          python3 -c "
          import re, sys
          with open('/tmp/app_raw.js') as f: content = f.read()
          m = re.search(r'const __vite__css = \"(.*?)\"\\n__vite__updateStyle', content, re.DOTALL)
          if m:
              css = m.group(1).encode().decode('unicode_escape')
              with open('/tmp/app.css','w') as f: f.write(css)
              print(f'Extracted CSS: {len(css)} bytes')
          else:
              # Fallback: maybe it's raw CSS
              with open('/tmp/app_raw.js') as f: raw = f.read()
              with open('/tmp/app.css','w') as f: f.write(raw)
              print(f'Using raw CSS: {len(raw)} bytes')
          "
          curl -sL 'https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap' \
            -H 'User-Agent: Mozilla/5.0' -o /tmp/fonts.css 2>/dev/null || true

          # 2) Copy favicon to root
          cp src/assets/favicon.ico _site/favicon.ico

          # 3) Copy all static assets
          cp -r src/assets/*.jpg src/assets/*.png _site/src/assets/ 2>/dev/null || true
          cp -r src/assets/logos/*.png _site/src/assets/logos/ 2>/dev/null || true
          cp -r src/assets/unveiled/*.jpg _site/src/assets/unveiled/ 2>/dev/null || true

          # 3) Write the Python build script (avoids shell escaping issues)
          cat > /tmp/build.py << 'PYEOF'
          import subprocess, os, re

          base = os.environ["BASE_PATH"]
          dev = os.environ["DEV_URL"]

          # Load CSS and fix animations (no JS means animate-in stays opacity:0)
          with open("/tmp/app.css") as f: app_css = f.read()
          # Override animate-in to be visible by default (JS won't run to add .visible)
          app_css += "\n.animate-in { opacity: 1 !important; transform: none !important; }\n"
          fonts_css = ""
          try:
              with open("/tmp/fonts.css") as f: fonts_css = f.read()
          except: pass

          style_tag = f"<style>{fonts_css}\n{app_css}</style>"

          pages = ["about","founder","memberships","community","contact",
                   "business-building-blocks","10x-productive","the-unveiled-experience"]
          langs = ["en","cs","es"]

          for lang in langs:
              for page in ["/"] + pages:
                  if page == "/":
                      url = f"{dev}/{lang}"
                      d = f"_site/{lang}"
                  else:
                      url = f"{dev}/{lang}/{page}"
                      d = f"_site/{lang}/{page}"
                  os.makedirs(d, exist_ok=True)

                  result = subprocess.run(["curl","-sL",url], capture_output=True, text=True)
                  html = result.stdout

                  if not html or "<!DOCTYPE" not in html:
                      print(f"SKIP: {lang}/{page} (empty)")
                      continue

                  # Remove stylesheet, modulepreload, and preload links (all assets are inlined or local)
                  html = re.sub(r'<link[^>]*rel="stylesheet"[^>]*/?>','', html)
                  html = re.sub(r'<link[^>]*rel="modulepreload"[^>]*/?>','', html)
                  html = re.sub(r'<link[^>]*rel="preload"[^>]*/?>','', html)
                  # Remove module scripts
                  html = re.sub(r'<script[^>]*type="module"[^>]*>.*?</script>','', html, flags=re.DOTALL)
                  html = re.sub(r'<script[^>]*type="module"[^>]*/>','', html)
                  # Remove @vite scripts
                  html = re.sub(r'<script[^>]*@vite[^>]*>.*?</script>','', html, flags=re.DOTALL)
                  html = re.sub(r'<script[^>]*@react-refresh[^>]*>.*?</script>','', html, flags=re.DOTALL)
                  # Remove any remaining script tags (dev-only)
                  html = re.sub(r'<script\b[^>]*>.*?</script>','', html, flags=re.DOTALL)

                  # Inject inline CSS + favicon before </head>
                  favicon = f'<link rel="icon" href="{base}/favicon.ico"/>'
                  html = html.replace("</head>", favicon + style_tag + "</head>")

                  # Rewrite asset paths for base path
                  html = html.replace('href="/src/', f'href="{base}/src/')
                  html = html.replace('src="/src/', f'src="{base}/src/')
                  html = html.replace('href="/en', f'href="{base}/en')
                  html = html.replace('href="/cs', f'href="{base}/cs')
                  html = html.replace('href="/es', f'href="{base}/es')
                  html = html.replace('href="/#', f'href="{base}/en/#')

                  # Fix external URLs that got wrongly prefixed
                  html = html.replace(f'href="{base}/http', 'href="http')
                  html = html.replace(f'src="{base}/http', 'src="http')
                  html = html.replace(f'href="{base}//', 'href="//')

                  with open(f"{d}/index.html","w") as f: f.write(html)
                  print(f"OK: {lang}/{page} ({len(html)} bytes)")
          PYEOF

          python3 /tmp/build.py

          kill $DEV_PID 2>/dev/null || true

          # Root redirect
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0;url='"${BASE_PATH}"'/en/"></head><body></body></html>' > _site/index.html

          # 404 fallback
          cp _site/en/index.html _site/404.html

          echo "=== Build complete ==="
          find _site -type f | wc -l
          du -sh _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
