name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BASE_PATH: /kafe-pro
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Mirror site from dev server
        run: |
          npm run dev &
          DEV_PID=$!

          # Wait for dev server
          for i in $(seq 1 30); do
            if curl -sL http://localhost:8080/en 2>/dev/null | grep -q '<!DOCTYPE'; then
              echo "Dev server ready"
              break
            fi
            sleep 1
          done

          # Use wget to mirror the entire site from dev server
          # This downloads HTML, CSS, JS, images — everything the browser would load
          wget --mirror \
               --convert-links \
               --adjust-extension \
               --page-requisites \
               --no-parent \
               --no-host-directories \
               --directory-prefix=_site \
               --reject-regex='@react-refresh|@vite/client|__vite_ping|\.hot-update\.' \
               --timeout=10 \
               --tries=2 \
               -e robots=off \
               http://localhost:8080/en/ \
               http://localhost:8080/en/about \
               http://localhost:8080/en/founder \
               http://localhost:8080/en/memberships \
               http://localhost:8080/en/community \
               http://localhost:8080/en/contact \
               http://localhost:8080/en/business-building-blocks \
               http://localhost:8080/en/10x-productive \
               http://localhost:8080/en/the-unveiled-experience \
               http://localhost:8080/cs/ \
               http://localhost:8080/cs/about \
               http://localhost:8080/cs/founder \
               http://localhost:8080/cs/memberships \
               http://localhost:8080/cs/community \
               http://localhost:8080/cs/contact \
               http://localhost:8080/cs/business-building-blocks \
               http://localhost:8080/cs/10x-productive \
               http://localhost:8080/cs/the-unveiled-experience \
               http://localhost:8080/es/ \
               http://localhost:8080/es/about \
               http://localhost:8080/es/founder \
               http://localhost:8080/es/memberships \
               http://localhost:8080/es/community \
               http://localhost:8080/es/contact \
               http://localhost:8080/es/business-building-blocks \
               http://localhost:8080/es/10x-productive \
               http://localhost:8080/es/the-unveiled-experience \
               2>&1 || true

          kill $DEV_PID 2>/dev/null || true

          # Root redirect
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0;url='"${BASE_PATH}"'/en/"></head><body></body></html>' > _site/index.html

          # 404 fallback
          cp _site/en/index.html _site/404.html 2>/dev/null || true

          # Show what we got
          echo "=== Files downloaded ==="
          find _site -type f | wc -l
          find _site -type f -name "*.html" | head -30
          echo "---"
          du -sh _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
