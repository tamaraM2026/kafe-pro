name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BASE_PATH: /kafe-pro
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build and pre-render
        run: |
          # Start dev server in background with base path
          VITE_BASE=$BASE_PATH npm run dev &
          DEV_PID=$!

          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -s http://localhost:8080/en/ > /dev/null 2>&1; then
              echo "Dev server ready"
              break
            fi
            sleep 1
          done

          # Create output directory
          mkdir -p _site

          # Pre-render all pages for all languages
          PAGES="/ /about /founder /memberships /community /contact /business-building-blocks /10x-productive /the-unveiled-experience"
          LANGS="en cs es"

          for lang in $LANGS; do
            for page in $PAGES; do
              path="/${lang}${page}"
              dir="_site${path}"
              mkdir -p "$dir"
              curl -s "http://localhost:8080${path}" -o "${dir}/index.html" || true
              echo "Pre-rendered: ${path}"
            done
          done

          # Root redirect page
          cat > _site/index.html << HTMLEOF
          <!DOCTYPE html>
          <html>
          <head><meta http-equiv="refresh" content="0;url=${BASE_PATH}/en/"></head>
          <body></body>
          </html>
          HTMLEOF

          # Download all referenced assets from rendered HTML
          for html in $(find _site -name "*.html"); do
            grep -oP '(?:src|href)="(/[^"]+)"' "$html" 2>/dev/null | grep -oP '"/[^"]+' | tr -d '"' | sort -u | while read asset; do
              if [[ ! -f "_site${asset}" ]] && [[ "$asset" != *//* ]] && [[ "$asset" != "#"* ]]; then
                asset_dir="_site$(dirname "$asset")"
                mkdir -p "$asset_dir"
                curl -s "http://localhost:8080${asset}" -o "_site${asset}" 2>/dev/null || true
              fi
            done
          done

          # Second pass — some assets reference other assets (CSS importing fonts, etc.)
          for html in $(find _site -name "*.html"); do
            grep -oP '(?:src|href)="(/[^"]+)"' "$html" 2>/dev/null | grep -oP '"/[^"]+' | tr -d '"' | sort -u | while read asset; do
              if [[ ! -f "_site${asset}" ]] && [[ "$asset" != *//* ]] && [[ "$asset" != "#"* ]]; then
                asset_dir="_site$(dirname "$asset")"
                mkdir -p "$asset_dir"
                curl -s "http://localhost:8080${asset}" -o "_site${asset}" 2>/dev/null || true
              fi
            done
          done

          # Rewrite absolute paths to include base path in all HTML files
          find _site -name "*.html" -exec sed -i \
            -e "s|href=\"/|href=\"${BASE_PATH}/|g" \
            -e "s|src=\"/|src=\"${BASE_PATH}/|g" \
            -e "s|url(/|url(${BASE_PATH}/|g" \
            {} +

          # Fix double base paths that might occur
          find _site -name "*.html" -exec sed -i \
            -e "s|${BASE_PATH}${BASE_PATH}|${BASE_PATH}|g" \
            -e "s|href=\"${BASE_PATH}//${BASE_PATH}|href=\"${BASE_PATH}|g" \
            -e "s|href=\"${BASE_PATH}/http|href=\"http|g" \
            -e "s|src=\"${BASE_PATH}/http|src=\"http|g" \
            {} +

          # Also rewrite JS files that contain absolute paths
          find _site -name "*.js" -exec sed -i \
            -e "s|\"/_build/|\"${BASE_PATH}/_build/|g" \
            -e "s|'/_build/|'${BASE_PATH}/_build/|g" \
            {} + 2>/dev/null || true

          # Create 404.html as copy of /en/ for SPA fallback
          cp _site/en/index.html _site/404.html 2>/dev/null || true

          # Stop dev server
          kill $DEV_PID 2>/dev/null || true

          FILE_COUNT=$(find _site -type f | wc -l)
          echo "Build complete. ${FILE_COUNT} files in _site"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
