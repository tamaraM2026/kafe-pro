name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BASE_PATH: /kafe-pro
      DEV_URL: http://localhost:8080
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build static site
        run: |
          npm run dev &
          DEV_PID=$!

          for i in $(seq 1 30); do
            if curl -sL ${DEV_URL}/en 2>/dev/null | grep -q '<!DOCTYPE'; then
              echo "Dev server ready"; break
            fi
            sleep 1
          done

          mkdir -p _site/src/assets/logos _site/src/assets/unveiled

          # 1) Download CSS from dev server (Vite compiles Tailwind on the fly)
          curl -sL ${DEV_URL}/src/styles.css -o /tmp/styles.css
          curl -sL "${DEV_URL}/@tanstack-start/styles.css?routes=__root__,%2F\$lang,%2F\$lang%2F" -o /tmp/tanstack.css 2>/dev/null || true
          INLINE_CSS="<style>$(cat /tmp/styles.css /tmp/tanstack.css 2>/dev/null)</style>"
          echo "CSS size: $(echo "$INLINE_CSS" | wc -c) bytes"

          # 2) Download Google Fonts CSS for offline use
          FONT_CSS=$(curl -sL 'https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap' \
            -H 'User-Agent: Mozilla/5.0' 2>/dev/null || true)

          # 3) Copy all static assets
          cp -r src/assets/*.jpg src/assets/*.png _site/src/assets/ 2>/dev/null || true
          cp -r src/assets/logos/*.png _site/src/assets/logos/ 2>/dev/null || true
          cp -r src/assets/unveiled/*.jpg _site/src/assets/unveiled/ 2>/dev/null || true

          # 4) Pre-render each page, inline CSS, strip module scripts
          PAGES="/ about founder memberships community contact business-building-blocks 10x-productive the-unveiled-experience"
          LANGS="en cs es"

          for lang in $LANGS; do
            for page in $PAGES; do
              if [ "$page" = "/" ]; then
                url="${DEV_URL}/${lang}"
                dir="_site/${lang}"
              else
                url="${DEV_URL}/${lang}/${page}"
                dir="_site/${lang}/${page}"
              fi
              mkdir -p "$dir"

              # Get SSR'd HTML
              HTML=$(curl -sL "$url" 2>/dev/null)

              # Remove <link rel="stylesheet"> tags (we'll inline CSS)
              HTML=$(echo "$HTML" | sed \
                -e 's|<link[^>]*rel="stylesheet"[^>]*/>||g' \
                -e 's|<link[^>]*rel="stylesheet"[^>]*>||g')

              # Remove <script type="module"> tags (breaks on static hosting)
              HTML=$(echo "$HTML" | sed \
                -e 's|<script[^>]*type="module"[^>]*>[^<]*</script>||g' \
                -e 's|<script[^>]*type="module"[^>]*/>||g')

              # Remove @vite and @react-refresh scripts
              HTML=$(echo "$HTML" | sed \
                -e 's|<script[^>]*@vite[^>]*>[^<]*</script>||g' \
                -e 's|<script[^>]*@react-refresh[^>]*>[^<]*</script>||g')

              # Inject inline CSS + fonts into <head>
              HTML=$(echo "$HTML" | sed "s|</head>|<style>${FONT_CSS}</style>${INLINE_CSS}</head>|")

              # Rewrite asset paths: /src/assets/ -> ${BASE_PATH}/src/assets/
              HTML=$(echo "$HTML" | sed \
                -e "s|href=\"/src/|href=\"${BASE_PATH}/src/|g" \
                -e "s|src=\"/src/|src=\"${BASE_PATH}/src/|g" \
                -e "s|href=\"/en|href=\"${BASE_PATH}/en|g" \
                -e "s|href=\"/cs|href=\"${BASE_PATH}/cs|g" \
                -e "s|href=\"/es|href=\"${BASE_PATH}/es|g" \
                -e "s|href=\"/#|href=\"${BASE_PATH}/en/#|g")

              # Fix external URLs that got prefixed
              HTML=$(echo "$HTML" | sed \
                -e "s|href=\"${BASE_PATH}/http|href=\"http|g" \
                -e "s|src=\"${BASE_PATH}/http|src=\"http|g" \
                -e "s|href=\"${BASE_PATH}//|href=\"//|g")

              echo "$HTML" > "${dir}/index.html"
              SIZE=$(wc -c < "${dir}/index.html")
              echo "Rendered: ${lang}/${page} (${SIZE} bytes)"
            done
          done

          kill $DEV_PID 2>/dev/null || true

          # 5) Root redirect
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0;url='"${BASE_PATH}"'/en/"></head><body></body></html>' > _site/index.html

          # 6) 404 fallback
          cp _site/en/index.html _site/404.html

          echo "=== Build complete ==="
          find _site -type f | wc -l
          du -sh _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
